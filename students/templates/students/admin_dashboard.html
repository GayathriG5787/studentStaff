{% extends 'students/dashboard_base.html' %}

{% block dashboard_content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-3 mb-4 border-bottom">
  <div>
    <h1 class="h2 fw-bold text-dark mb-0">Admin Dashboard</h1>
  </div>
</div>

<div class="row g-4">
  <div class="col-12 col-sm-6 col-md-6 col-lg-4">
    <div class="card border-1 shadow-sm rounded-3 bg-white h-100">
      <div class="card-body p-4 d-flex flex-column align-items-start">
        <div class="bg-primary bg-opacity-10 text-primary rounded-3 p-3 mb-3 fs-4 d-inline-flex">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <h5 class="fw-bold text-dark mb-2">Student Registration</h5>
        <p class="text-muted small mb-4">
          Enroll new students into the system database, assign core details, and configure initial profiles.
        </p>
        <a href="{% url 'student-add' %}" class="btn btn-outline-primary btn-sm rounded-2 fw-semibold px-3 mt-auto">
          Go to Registration
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
