{% extends 'students/dashboard_base.html' %}

{% block dashboard_content %}
<div class="pt-4 pb-3 mb-4 border-bottom">
    <h1 class="h2 fw-bold text-dark mb-0">Add Student</h1>
</div>

<div class="card border-1 shadow-sm rounded-3 bg-white p-4" style="max-width: 600px;">
    <form action="" method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary px-4" type="submit">Add Student</button>
    </form>
</div>
{% endblock %}
