{% extends 'accounts/base.html' %}

{% block content %}

<!-- flex-column is flex-direction column, to stack the flex items vertically -->
<div class="min-vh-100 d-flex flex-column justify-content-between bg-light bg-gradient">
    
    <div class="container pt-4 text-center text-md-start">
        <a class="navbar-brand fw-bold text-primary fs-4 text-decoration-none" href="/">
            <i class="bi bi-mortarboard-fill me-2"></i>NWMP
        </a>
    </div>

    <div class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                
                <div class="card border-1 shadow-sm rounded-4 bg-white">
                    <div class="card-body p-4">
                        
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle p-3 mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-lock-fill fs-3"></i>
                            </div>
                            <h3 class="fw-bold text-dark mb-1">Welcome Back</h3>
                            <p class="text-muted small">Please sign in to access your dashboard</p>
                        </div>

                        <form method="POST" action="">
                            {% csrf_token %}
                            
                            <div class="django-form-fields mb-4">
                                {{ form.as_p }}
                            </div>

                            <!-- d-grid is used to stretch the button to occupy the parent container width -->
                            <div class="d-grid pt-2">
                                <button class="btn btn-primary btn-lg rounded-3 fw-bold shadow-sm fs-6" type="submit">
                                    Sign In
                                </button>
                            </div>
                        </form>
                        
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="/" class="text-muted small text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Back to Homepage
                    </a>
                </div>

            </div>
        </div>
    </div>

    <div class="container pb-4 text-center text-muted small">
        &copy; 2026 NWMP. Secure Portal Access.
    </div>
</div>

<style>
    .django-form-fields p {
        margin-bottom: 1.25rem;
    }
    .django-form-fields label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #495057;
    }
    .django-form-fields input, 
    .django-form-fields select, 
    .django-form-fields textarea {
        display: block;
        width: 100%;
        /* 1st value = padding top and bottom */
        /* 2nd value = padding right and left */
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        /* ease-in-out = animation starts slow, speeds up in the middle and ends slow */
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
    .django-form-fields input:focus {
        color: #212529;
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
    }
    /* Styles error lists automatically if validation fails */
    .django-form-fields .errorlist {
        list-style: none;
        padding-left: 0;
        color: #dc3545;
        font-size: 0.8125rem;
        margin-top: 0.25rem;
    }
</style>
{% endblock %}
