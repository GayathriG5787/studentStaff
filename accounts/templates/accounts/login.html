{% extends 'accounts/base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3>Login</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="">
                        {% csrf_token %}
                        {{form.as_p}}
                        <a href="{% url 'dashboard' %}" class="btn btn-primary">Login</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
